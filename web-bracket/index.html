<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>March Madness Bracket 2025</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page">
      <header class="header">
        <h1>March Madness 2025 Bracket Picker</h1>
        <p>Click winners through the Championship. Hover a team button to see full text.</p>
      </header>

      <section class="controls">
        <button class="tab active" data-tab="mens">Men's Tournament</button>
        <button class="tab" data-tab="womens">Women's Tournament</button>
        <button id="clearPicks" class="clear-btn">Clear Picks</button>
      </section>

      <section id="app" class="app"></section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
